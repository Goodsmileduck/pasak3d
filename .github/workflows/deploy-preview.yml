name: Deploy Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  preview:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Check version bump
        id: version-check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: mainPkg } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'package.json',
              ref: 'main'
            });
            const mainVersion = JSON.parse(Buffer.from(mainPkg.content, 'base64').toString()).version;
            const fs = require('fs');
            const prVersion = JSON.parse(fs.readFileSync('package.json', 'utf8')).version;
            const bumped = mainVersion !== prVersion;
            core.setOutput('bumped', bumped);
            core.setOutput('main_version', mainVersion);
            core.setOutput('pr_version', prVersion);
            if (!bumped) {
              core.warning(`Version not bumped (still ${mainVersion}). Skipping preview deploy.`);
            }

      - uses: actions/setup-node@v4
        if: steps.version-check.outputs.bumped == 'true'
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: steps.version-check.outputs.bumped == 'true'

      - run: npm run build:web
        if: steps.version-check.outputs.bumped == 'true'

      - name: Deploy preview
        if: steps.version-check.outputs.bumped == 'true'
        uses: cloudflare/wrangler-action@v3
        id: deploy
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=pasak --branch=${{ github.head_ref }}

      - name: Comment preview URL
        if: steps.version-check.outputs.bumped == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🔍 Preview deployed for \`${{ github.head_ref }}\`\n${{ steps.deploy.outputs.deployment-url }}`
            })

      - name: Comment version not bumped
        if: steps.version-check.outputs.bumped != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ Preview deploy skipped — version not bumped (still \`${{ steps.version-check.outputs.main_version }}\`).\n\nRun \`npm version patch\` (or \`minor\`/\`major\`) to bump before merging.`
            })
