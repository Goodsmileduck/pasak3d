name: Cleanup Preview Deployments

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview deployments for branch
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          BRANCH: ${{ github.head_ref }}
        run: |
          BASE_URL="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/pasak/deployments"
          all_ids=""
          page=1

          while true; do
            response=$(curl -s \
              "$BASE_URL?per_page=25&page=$page" \
              -H "Authorization: Bearer $CF_API_TOKEN")

            success=$(echo "$response" | jq -r '.success // false')
            if [ "$success" != "true" ]; then
              echo "API call failed:"
              echo "$response" | jq -r '.errors // "unknown error"'
              exit 1
            fi

            ids=$(echo "$response" | jq -r ".result[] | select(.deployment_trigger.metadata.branch == \"$BRANCH\") | .id")
            all_ids="$all_ids $ids"

            count=$(echo "$response" | jq '.result | length')
            if [ "$count" -lt 25 ]; then
              break
            fi
            page=$((page + 1))
          done

          if [ -z "$(echo "$all_ids" | tr -d ' ')" ]; then
            echo "No deployments found for branch $BRANCH"
            exit 0
          fi

          for id in $all_ids; do
            echo "Deleting deployment: $id"
            curl -s -X DELETE \
              "$BASE_URL/$id?force=true" \
              -H "Authorization: Bearer $CF_API_TOKEN" | jq -r 'if .success then "  ✓ deleted" else "  ✗ \(.errors)" end'
          done
